name: Graph Sync

on:
  push:
    branches: [main]
    paths:
      - 'terraform/**/*.tf'
      - 'terraform/**/*.tfvars'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Sync graph to backend
        env:
          INFLAIR_API_URL: ${{ vars.INFLAIR_API_URL }}
        run: |
          if [ -z "$INFLAIR_API_URL" ]; then
            echo "INFLAIR_API_URL not configured — skipping sync"
            exit 0
          fi

          python3 -c "
import json, os, sys

files = {}
for root, dirs, filenames in os.walk('terraform'):
    dirs[:] = [d for d in dirs if not d.startswith('.')]
    for f in filenames:
        if f.endswith('.tf') or f.endswith('.tfvars'):
            path = os.path.join(root, f)
            with open(path) as fh:
                files[path] = fh.read()

print(json.dumps({'files': files}))
" > /tmp/sync-payload.json

          curl -sS -f -X POST "$INFLAIR_API_URL/api/sync" \
            -H "Content-Type: application/json" \
            -d @/tmp/sync-payload.json
