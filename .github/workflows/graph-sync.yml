name: Graph Sync

on:
  push:
    branches: [main]
    paths:
      - 'terraform/**/*.tf'
      - 'terraform/**/*.tfvars'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Sync graph to backend
        env:
          INFLAIR_API_URL: ${{ vars.INFLAIR_API_URL }}
        run: |
          if [ -z "$INFLAIR_API_URL" ]; then
            echo "INFLAIR_API_URL not configured — skipping sync"
            exit 0
          fi

          payload='{"files":{}}'
          while IFS= read -r -d '' f; do
            payload=$(jq --arg k "$f" --rawfile v "$f" '.files[$k] = $v' <<< "$payload")
          done < <(find terraform \( -name "*.tf" -o -name "*.tfvars" \) -print0)

          echo "Syncing $(echo "$payload" | jq '.files | length') terraform files..."

          curl -sS -f -X POST "$INFLAIR_API_URL/api/sync" \
            -H "Content-Type: application/json" \
            -d "$payload"
