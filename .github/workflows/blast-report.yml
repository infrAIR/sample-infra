name: Blast Radius Report

on:
  pull_request:
    paths:
      - 'terraform/**/*.tf'
      - 'terraform/**/*.tfvars'
      - 'testdata/plan.json'

permissions:
  pull-requests: write
  contents: read

jobs:
  blast-report:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.9.0'

      # Generate a fresh plan if AWS creds are configured, otherwise fall
      # back to the committed testdata/plan.json so the workflow always runs.
      - name: Generate Terraform plan
        working-directory: terraform
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION:    us-east-1
        run: |
          if [ -z "$AWS_ACCESS_KEY_ID" ]; then
            echo "No AWS credentials — using testdata/plan.json"
            cp ../testdata/plan.json plan.json
          else
            terraform init -backend=false
            terraform plan -out=tfplan -refresh=false
            terraform show -json tfplan > plan.json
          fi

      - name: Post blast radius report
        env:
          INFLAIR_API_URL: ${{ vars.INFLAIR_API_URL }}
        run: |
          jq -n \
            --argjson plan "$(cat terraform/plan.json)" \
            --arg token "${{ secrets.GITHUB_TOKEN }}" \
            --arg repo  "${{ github.repository }}" \
            --argjson pr ${{ github.event.pull_request.number }} \
            --arg sha   "${{ github.sha }}" \
            '{plan: $plan, github_token: $token, repository: $repo, pr_number: $pr, commit_sha: $sha}' \
          > /tmp/payload.json

          curl -sS -f -X POST "$INFLAIR_API_URL/api/prcheck" \
            -H "Content-Type: application/json" \
            -d @/tmp/payload.json
